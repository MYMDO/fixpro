name: Build FiXPro Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: pip3 install platformio

      - name: Build
        run: |
          cd firmware/platformio
          pio run

      - name: Show output
        run: ls -la firmware/platformio/.pio/build/pico/*.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fixpro-firmware
          path: firmware/platformio/.pio/build/pico/*.uf2

      - name: Create Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/platformio/.pio/build/pico/*.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
