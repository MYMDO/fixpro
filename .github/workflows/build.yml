name: Build FiXPro Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: pip3 install platformio

      - name: Build
        run: |
          cd firmware/platformio
          pio run

      - name: Show output
        run: ls -la firmware/platformio/.pio/build/pico/*.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fixpro-firmware
          path: firmware/platformio/.pio/build/pico/*.uf2

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: fixpro-firmware
          path: firmware

      - name: Get version
        id: version
        run: |
          VERSION="v2.0.$(date +%Y%m%d%H%M%S)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating release: $VERSION"

      - name: Create checksums
        run: sha256sum firmware/*.uf2 > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          files: firmware/*.uf2 SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
