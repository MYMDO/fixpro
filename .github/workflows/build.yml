name: Build FiXPro Firmware

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

env:
  FW_VERSION: "2.1.0"
  PICO_SDK_VERSION: "2.0.0"

jobs:
  build-platformio:
    name: Build (PlatformIO)
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="build-${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building PlatformIO firmware version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build with PlatformIO
        working-directory: firmware/platformio
        run: pio run

      - name: List build outputs
        run: |
          echo "=== PlatformIO Firmware ==="
          ls -lh firmware/platformio/.pio/build/rpipico/*.uf2 2>/dev/null || true

      - name: Upload PlatformIO firmware
        uses: actions/upload-artifact@v4
        with:
          name: FiXPro-firmware-platformio-${{ steps.version.outputs.VERSION }}
          path: firmware/platformio/.pio/build/rpipico/*.uf2
          retention-days: 30

  build-pico-sdk:
    name: Build (Pico SDK)
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz -O /tmp/arm-none-eabi.tar.xz
          sudo tar -xf /tmp/arm-none-eabi.tar.xz -C /opt
          echo "/opt/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH
          arm-none-eabi-gcc --version

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk && git submodule update --init --depth 1

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="build-${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building FiXPro firmware version: $VERSION"

      - name: Configure CMake
        working-directory: firmware
        env:
          PICO_SDK_PATH: ~/pico-sdk
          CC: /opt/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi/bin/arm-none-eabi-gcc
          CXX: /opt/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi/bin/arm-none-eabi-g++
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$PICO_SDK_PATH/cmake/preload/toolchains/pico_arm_cortex_m0plus_gcc.cmake \
            -DPICO_SDK_PATH=$PICO_SDK_PATH \
            -DPICO_BOARD=pico \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build firmware
        working-directory: firmware
        run: cmake --build build -j$(nproc)

      - name: List build outputs
        run: |
          echo "=== Firmware Artifacts ==="
          ls -lh firmware/build/*.uf2 2>/dev/null || true

      - name: Upload Pico SDK firmware
        uses: actions/upload-artifact@v4
        with:
          name: FiXPro-firmware-picosdk-${{ steps.version.outputs.VERSION }}
          path: firmware/build/*.uf2
          retention-days: 30

  release:
    name: Create Release
    needs: [build-platformio, build-pico-sdk]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Prepare release
        run: |
          echo "=== Release Contents ==="
          mkdir -p firmware
          find release -name "*.uf2" -exec cp {} firmware/ \; 2>/dev/null || true
          ls -lh firmware/
          sha256sum firmware/*.uf2 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*.uf2 SHA256SUMS.txt
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
