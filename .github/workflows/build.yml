name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

env:
  FW_VERSION: "1.0.0"
  PICO_SDK_VERSION: "2.0.0"
  PICO_SDK_PATH: "/github/workspace/pico-sdk"

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} \
            https://github.com/raspberrypi/pico-sdk.git ./pico-sdk
          cd pico-sdk
          git submodule update --init

      - name: Build Pico Firmware
        id: build
        uses: samyarsadat/Pico-Build-Action@v1
        with:
          source_dir: "firmware"
          cmake_args: "-DCMAKE_BUILD_TYPE=Release -DPICO_SDK_PATH=${{ env.PICO_SDK_PATH }}"

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="build-${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building FiXPro firmware version: $VERSION"

      - name: List build outputs
        run: |
          ls -la ${{ steps.build.outputs.output_dir }}/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.VERSION }}
          path: |
            ${{ steps.build.outputs.output_dir }}/*.uf2
            ${{ steps.build.outputs.output_dir }}/*.bin
            ${{ steps.build.outputs.output_dir }}/*.hex
            ${{ steps.build.outputs.output_dir }}/*.elf
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          path: firmware

      - name: Prepare release
        id: release
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p release
          cp firmware/*.uf2 release/ 2>/dev/null || true
          cp firmware/*.bin release/ 2>/dev/null || true
          cp firmware/*.hex release/ 2>/dev/null || true
          cp firmware/*.elf release/ 2>/dev/null || true
          cd release
          sha256sum *.{uf2,bin,hex,elf} 2>/dev/null > SHA256SUMS.txt || true
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
