name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

env:
  PICO_SDK_VERSION: "2.0.0"
  FW_VERSION: "1.0.0"

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake make libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Clone Pico SDK
        run: |
          cd ..
          git clone --recurse-submodules --depth 1 --branch ${{ env.PICO_SDK_VERSION }} https://github.com/raspberrypi/pico-sdk.git

      - name: Get current version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="build-${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "FIRMWARE_NAME=FiXPro" >> $GITHUB_OUTPUT
          echo "Building FiXPro firmware version: $VERSION"

      - name: Create build directory
        run: mkdir -p firmware/build

      - name: Configure CMake
        working-directory: firmware/build
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/../pico-sdk
        run: |
          cmake -DPICO_SDK_PATH="$PICO_SDK_PATH" -DCMAKE_BUILD_TYPE=Release ..

      - name: Build firmware
        working-directory: firmware/build
        run: make -j$(nproc)

      - name: List build outputs
        run: |
          ls -la firmware/build/*.uf2
          ls -la firmware/build/*.bin
          ls -la firmware/build/*.elf

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.VERSION }}
          path: |
            firmware/build/*.uf2
            firmware/build/*.bin
            firmware/build/*.hex
            firmware/build/*.elf
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}

      - name: Prepare release
        id: release
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          
          # Create release directory
          mkdir -p release
          
          # Copy firmware files
          cp *.uf2 release/
          cp *.bin release/
          cp *.hex release/
          cp *.elf release/
          
          # Create SHA256 checksums
          cd release
          sha256sum *.uf2 *.bin *.hex > SHA256SUMS.txt
          cat SHA256SUMS.txt
          
          # Create firmware info
          cat > firmware-info.txt << 'EOF'
          FiXPro Firmware Information
          ===========================
          
          Version: $VERSION
          Build Date: $(date -I)
          Platform: Raspberry Pi RP2040
          
          Files included:
          - FiXPro.uf2  - UF2 firmware file for drag-and-drop programming
          - FiXPro.bin   - Raw binary firmware
          - FiXPro.hex   - Intel HEX format
          - FiXPro.elf   - ELF with debug symbols
          
          Installation:
          1. Connect Pico in BOOT mode
          2. Copy FiXPro.uf2 to RPI-RP2 drive
          3. Wait for Pico to reboot
          
          For more information visit: https://fx.in.ua
          EOF
          cat firmware-info.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
