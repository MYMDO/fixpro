<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiXPro - Simple Test</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        h1 { color: #0af; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; }
        textarea { width: 100%; height: 200px; background: #000; color: #0f0; font-family: monospace; }
        #output { background: #000; padding: 10px; height: 200px; overflow: auto; border: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>FiXPro - Simple Test</h1>
    <button id="btn" onclick="toggle()">CONNECT</button>
    <button onclick="send('PING\n')">SEND PING</button>
    <button onclick="send('TEST\n')">SEND TEST</button>
    <button onclick="send('HELLO\n')">SEND HELLO</button>
    <div id="output"></div>
    
    <script>
        let port = null;
        let reading = false;
        const out = document.getElementById('output');
        
        function log(msg) {
            out.innerHTML += msg + '<br>';
            out.scrollTop = out.scrollHeight;
        }
        
        async function toggle() {
            if (port) {
                reading = false;
                try {
                    if (port.readable) port.readable.getReader().cancel();
                    await port.close();
                } catch(e) {}
                port = null;
                document.getElementById('btn').textContent = 'CONNECT';
                log('Disconnected');
            } else {
                try {
                    port = await navigator.serial.requestPort({});
                    await port.open({ baudRate: 115200 });
                    document.getElementById('btn').textContent = 'DISCONNECT';
                    log('Connected!');
                    reading = true;
                    startRead();
                } catch(e) {
                    log('Error: ' + e.message);
                }
            }
        }
        
        async function startRead() {
            if (!port) return;
            while (reading) {
                try {
                    const reader = port.readable.getReader();
                    const { value, done } = await reader.read();
                    reader.releaseLock();
                    if (done) { log('Done'); break; }
                    if (value) {
                        const hex = Array.from(value).map(b => b.toString(16).padStart(2,'0')).join(' ');
                        log('<span style="color:#0f0">RX hex:</span> ' + hex);
                    }
                } catch(e) {
                    if (e.name !== 'AbortError') log('<span style="color:#f00">Error:</span> ' + e.message);
                    break;
                }
            }
        }
        
        async function send(text) {
            if (!port) { log('Not connected!'); return; }
            try {
                const w = port.writable.getWriter();
                await w.write(new TextEncoder().encode(text));
                w.releaseLock();
                log('<span style="color:#fa0">TX:</span> ' + JSON.stringify(text));
            } catch(e) {
                log('<span style="color:#f00">Write error:</span> ' + e.message);
            }
        }
        
        if (!('serial' in navigator)) {
            document.body.innerHTML = '<h1>Web Serial NOT supported</h1>';
        }
    </script>
</body>
</html>
